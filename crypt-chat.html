<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypt · Salon P2P Chiffré</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,800&display=swap');

  :root {
    --bg: #07090c;
    --surface: #0c1017;
    --surface-2: #11161e;
    --border: #1a2130;
    --border-hi: #2a3a50;
    --green: #00e59b;
    --green-dim: #082e22;
    --green-ghost: rgba(0,229,155,.05);
    --amber: #ffb224;
    --amber-dim: #2e2308;
    --red: #ff6369;
    --text: #c9d1d9;
    --text-dim: #4a5260;
    --text-faint: #252b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .4;
  }

  /* ── Header ── */
  header {
    padding: .65rem 1.1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .brand {
    display: flex; align-items: center; gap: .6rem;
  }

  .brand-icon {
    width: 26px; height: 26px;
    border: 2px solid var(--green);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: .65rem; color: var(--green);
    box-shadow: 0 0 10px rgba(0,229,155,.12);
    position: relative;
  }

  .brand-icon::after {
    content: ''; position: absolute;
    width: 5px; height: 5px;
    background: var(--green); border-radius: 50%;
    animation: blink 3s ease-in-out infinite;
  }

  @keyframes blink { 0%,80%,100%{opacity:1}90%{opacity:0} }

  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 800; font-size: 1.05rem;
    letter-spacing: -.03em;
  }

  .brand-tag {
    font-size: .55rem; color: var(--text-dim);
    letter-spacing: .08em; text-transform: uppercase;
  }

  .hdr-right {
    display: flex; align-items: center; gap: .8rem;
    font-size: .68rem;
  }

  .pill {
    display: flex; align-items: center; gap: .35rem;
    padding: 2px 9px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--surface-2);
  }

  .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
  }

  .dot.off { background: var(--text-dim); box-shadow: none; }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    flex: 1; min-height: 0;
  }

  @media (max-width: 680px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }

  .sb-section {
    padding: .7rem .8rem;
    border-bottom: 1px solid var(--border);
  }

  .sb-label {
    font-size: .58rem; text-transform: uppercase;
    letter-spacing: .11em; color: var(--text-dim);
    margin-bottom: .5rem;
    display: flex; align-items: center; justify-content: space-between;
  }

  .room-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: .45rem .65rem;
    display: flex; align-items: center; gap: .4rem;
  }

  .room-box .hash { color: var(--green); font-size: .75rem; flex-shrink:0; }

  .room-box input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: .72rem;
  }

  .room-box button {
    background: var(--green); color: var(--bg); border: none;
    border-radius: 4px; padding: 2px 8px;
    font-family: inherit; font-size: .6rem; font-weight: 600;
    cursor: pointer;
  }

  .my-id-row {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; padding: .4rem .6rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: border-color .2s;
    margin-top: .4rem;
  }
  .my-id-row:hover { border-color: var(--green); }
  .my-id-row code { font-size: .65rem; color: var(--green); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .my-id-row .hint { font-size: .55rem; color: var(--text-dim); flex-shrink:0; }

  /* Peer list */
  .peers { flex: 1; overflow-y: auto; padding: .4rem; }

  .peer-row {
    display: flex; align-items: center; gap: .5rem;
    padding: .45rem .6rem; border-radius: 7px;
    margin-bottom: 1px;
    transition: background .12s;
  }
  .peer-row:hover { background: var(--green-ghost); }

  .peer-av {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: .6rem; color: var(--green); flex-shrink: 0;
  }

  .peer-nm { font-size: .72rem; }
  .peer-st { font-size: .55rem; color: var(--text-dim); display: flex; align-items: center; gap: .25rem; }

  /* ── Chat ── */
  .chat {
    display: flex; flex-direction: column;
    min-height: 0; background: var(--bg);
  }

  .chat-hdr {
    padding: .6rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-hdr-left { display: flex; align-items: center; gap: .6rem; }
  .chat-hdr-room { font-family: 'Fraunces', serif; font-weight: 600; font-size: .95rem; }

  .enc-badge {
    font-size: .55rem; display: flex; align-items: center; gap: .25rem;
    padding: 2px 8px; border-radius: 100px;
  }
  .enc-badge.ok { color: var(--green); background: var(--green-dim); }

  .chat-hdr-count { font-size: .68rem; color: var(--text-dim); }

  .messages {
    flex: 1; overflow-y: auto;
    padding: .8rem 1rem;
    display: flex; flex-direction: column; gap: .25rem;
  }

  .msg {
    max-width: 75%; padding: .45rem .75rem;
    border-radius: 9px; font-size: .78rem; line-height: 1.5;
    animation: msgIn .2s ease-out;
  }

  @keyframes msgIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)} }

  .msg.sent {
    align-self: flex-end;
    background: var(--green-dim); color: var(--text);
    border-bottom-right-radius: 2px;
  }

  .msg.recv {
    align-self: flex-start;
    background: var(--surface-2); color: var(--text);
    border-bottom-left-radius: 2px;
  }

  .msg .msg-author {
    font-size: .6rem; font-weight: 600;
    margin-bottom: 1px; opacity: .7;
  }

  .msg.sent .msg-author { color: var(--green); }
  .msg.recv .msg-author { color: var(--amber); }

  .msg .msg-time {
    font-size: .5rem; color: var(--text-dim);
    margin-top: 2px; display: block;
  }

  .msg.sys {
    align-self: center; max-width: 90%;
    background: none; color: var(--text-dim);
    font-size: .62rem; text-align: center;
    padding: .25rem .6rem;
    border: 1px dashed var(--border);
    border-radius: 5px;
  }

  /* Compose */
  .compose {
    padding: .6rem .8rem;
    border-top: 1px solid var(--border);
    display: flex; gap: .4rem;
    background: var(--surface);
    flex-shrink: 0;
  }

  .compose input {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    padding: .55rem .8rem; color: var(--text);
    font-family: inherit; font-size: .78rem;
    outline: none; transition: border-color .2s;
  }
  .compose input:focus { border-color: var(--green); }
  .compose input::placeholder { color: var(--text-faint); }

  .compose button {
    background: var(--green); color: var(--bg); border: none;
    border-radius: 7px; padding: .55rem 1rem;
    font-family: inherit; font-weight: 600; font-size: .78rem;
    cursor: pointer; transition: opacity .12s;
  }
  .compose button:hover { opacity: .8; }
  .compose button:disabled { opacity: .25; cursor: default; }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 2rem; width: 360px;
    text-align: center;
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 1.2rem;
    margin-bottom: .2rem;
  }

  .modal p {
    font-size: .72rem; color: var(--text-dim);
    margin-bottom: 1rem; line-height: 1.5;
  }

  .modal .field { margin-bottom: .8rem; text-align: left; }

  .modal .field label {
    display: block; font-size: .6rem;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-dim); margin-bottom: .3rem;
  }

  .modal input {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 7px;
    padding: .65rem .8rem; color: var(--text);
    font-family: inherit; font-size: .82rem;
    outline: none; transition: border-color .2s;
  }
  .modal input:focus { border-color: var(--green); }

  .modal button {
    width: 100%; background: var(--green); color: var(--bg);
    border: none; border-radius: 8px; padding: .7rem;
    font-family: inherit; font-weight: 600; font-size: .82rem;
    cursor: pointer; margin-top: .4rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Modal d'entrée -->
<div class="overlay" id="entryModal">
  <div class="modal">
    <h2>Rejoindre un salon</h2>
    <p>Les messages sont chiffrés de bout en bout.<br>Aucun serveur ne voit leur contenu.</p>
    <div class="field">
      <label>Pseudo</label>
      <input type="text" id="inpUsername" placeholder="ton pseudo…" maxlength="20" autofocus />
    </div>
    <div class="field">
      <label>Nom du salon</label>
      <input type="text" id="inpRoom" placeholder="ex: secret-meeting" maxlength="40" value="lobby" />
    </div>
    <button onclick="joinRoom()">Entrer</button>
  </div>
</div>

<header>
  <div class="brand">
    <div class="brand-icon">⬡</div>
    <span class="brand-name">Crypt</span>
    <span class="brand-tag">e2e · p2p · zero serveur</span>
  </div>
  <div class="hdr-right">
    <div class="pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">…</span>
    </div>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Salon</div>
      <div class="room-box">
        <span class="hash">#</span>
        <input type="text" id="roomDisplay" readonly />
        <button onclick="changeRoom()">changer</button>
      </div>
      <div class="my-id-row" onclick="copyMyId()" title="Copier mon ID">
        <code id="myIdShort">…</code>
        <span class="hint" id="copyHint">copier</span>
      </div>
    </div>

    <div class="sb-section" style="flex-shrink:0;">
      <div class="sb-label">
        Connectés
        <span id="peerCount" style="color:var(--green);">0</span>
      </div>
    </div>

    <div class="peers" id="peerList"></div>
  </div>

  <div class="chat">
    <div class="chat-hdr">
      <div class="chat-hdr-left">
        <div class="chat-hdr-room" id="chatRoomName">#lobby</div>
        <div class="enc-badge ok">🔒 E2E</div>
      </div>
      <div class="chat-hdr-count"><span id="chatPeerCount">0</span> pairs</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="compose">
      <input type="text" id="msgInput" placeholder="Message chiffré…" autocomplete="off" disabled />
      <button id="sendBtn" onclick="sendToAll()" disabled>Envoyer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  SECURE CONTEXT CHECK
// ═══════════════════════════════════════
// crypto.subtle requires HTTPS or localhost — it is undefined on file:// in Chrome/Edge.
if (!window.isSecureContext || !crypto.subtle) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#07090c;font-family:'IBM Plex Mono',monospace;color:#c9d1d9;text-align:center;padding:2rem;">
      <div>
        <div style="font-size:2rem;margin-bottom:1rem;">🔒</div>
        <div style="color:#ff6369;font-size:.9rem;margin-bottom:.6rem;">Contexte non sécurisé</div>
        <div style="font-size:.75rem;color:#4a5260;line-height:1.7;">
          L'API Web Crypto (<code>crypto.subtle</code>) requiert HTTPS ou localhost.<br>
          Vous ne pouvez pas ouvrir ce fichier directement via <code>file://</code>.<br><br>
          <strong style="color:#c9d1d9;">Solutions :</strong><br>
          • Servez le fichier via un serveur local :<br>
          <code style="color:#00e59b;">npx serve .</code> ou <code style="color:#00e59b;">python -m http.server</code><br>
          • Ou déployez-le sur un hébergeur HTTPS (GitHub Pages, Netlify…)
        </div>
      </div>
    </div>`;
  throw new Error('crypto.subtle unavailable — not a secure context (file:// is not allowed)');
}

// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const ROOM_PREFIX = 'crypt-v1-';
// On crée N "slots" par room. Chaque nouveau visiteur
// essaie de se connecter à tous les slots existants.
// C'est le mécanisme de découverte sans serveur.
const MAX_SLOTS = 20;

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let myUsername = '';
let roomName = '';
let mySlot = -1;
let peer = null;
let myKeyPair = null;

// peerId → { conn, username, sharedKey }
const peers = new Map();
// All chat messages (shared room = single conversation)
const chatLog = [];

// ═══════════════════════════════════════
//  CRYPTO — ECDH + AES-256-GCM
// ═══════════════════════════════════════
async function genKeyPair() {
  return crypto.subtle.generateKey(
    { name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveKey']
  );
}

async function exportPub(k) {
  const raw = await crypto.subtle.exportKey('raw', k);
  return btoa(String.fromCharCode(...new Uint8Array(raw)));
}

async function importPub(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey('raw', raw, { name: 'ECDH', namedCurve: 'P-256' }, false, []);
}

async function deriveKey(priv, pub) {
  return crypto.subtle.deriveKey(
    { name: 'ECDH', public: pub }, priv,
    { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function encrypt(text, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, new TextEncoder().encode(text)
  );
  return {
    iv: btoa(String.fromCharCode(...iv)),
    d: btoa(String.fromCharCode(...new Uint8Array(ct)))
  };
}

async function decrypt(payload, key) {
  const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
  const d = Uint8Array.from(atob(payload.d), c => c.charCodeAt(0));
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, d);
  return new TextDecoder().decode(pt);
}

// ═══════════════════════════════════════
//  ROOM JOIN
// ═══════════════════════════════════════
async function joinRoom() {
  const u = document.getElementById('inpUsername').value.trim();
  const r = document.getElementById('inpRoom').value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '');
  if (!u || !r) return;

  myUsername = u;
  roomName = r;

  document.getElementById('entryModal').style.display = 'none';
  document.getElementById('roomDisplay').value = roomName;
  document.getElementById('chatRoomName').textContent = '#' + roomName;

  myKeyPair = await genKeyPair();

  // Pick a random slot and try to register
  await trySlots();
}

// Key listeners for modal
document.getElementById('inpUsername').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inpRoom').focus();
});
document.getElementById('inpRoom').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});

async function trySlots() {
  // Try to claim a slot (deterministic peer ID based on room + slot)
  const shuffled = [...Array(MAX_SLOTS).keys()].sort(() => Math.random() - .5);

  for (const slot of shuffled) {
    const id = ROOM_PREFIX + roomName + '-' + slot;
    try {
      await tryClaimSlot(id, slot);
      return; // success
    } catch {
      // Slot taken, try next
    }
  }

  // All slots taken → connect with random ID and rely on discovery
  initWithRandomId();
}

function tryClaimSlot(id, slot) {
  return new Promise((resolve, reject) => {
    const p = new Peer(id, {
      config: { iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]}
    });

    const timeout = setTimeout(() => {
      p.destroy();
      reject(new Error('timeout'));
    }, 4000);

    p.on('open', () => {
      clearTimeout(timeout);
      peer = p;
      mySlot = slot;
      onPeerReady();
      resolve();
    });

    p.on('error', err => {
      clearTimeout(timeout);
      p.destroy();
      reject(err);
    });
  });
}

function initWithRandomId() {
  peer = new Peer(undefined, {
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]}
  });
  peer.on('open', () => onPeerReady());
  peer.on('error', err => console.error(err));
}

function onPeerReady() {
  const id = peer.id;
  document.getElementById('myIdShort').textContent = id;
  document.getElementById('statusDot').classList.remove('off');
  document.getElementById('statusText').textContent = 'en ligne';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;

  sysMsg(`Connecté au salon #${roomName} — votre ID : ${id}`);

  // Listen for incoming connections
  peer.on('connection', conn => handleConn(conn));

  // Now scan all slots to discover peers
  discoverPeers();
}

// ═══════════════════════════════════════
//  PEER DISCOVERY — scan room slots
// ═══════════════════════════════════════
function discoverPeers() {
  for (let s = 0; s < MAX_SLOTS; s++) {
    const targetId = ROOM_PREFIX + roomName + '-' + s;
    if (targetId === peer.id) continue; // skip self

    // Try to connect — if the slot is taken by someone, it works
    const conn = peer.connect(targetId, { reliable: true });
    handleConn(conn);
  }

  sysMsg('Recherche de pairs dans le salon…');
}

// ═══════════════════════════════════════
//  CONNECTION HANDLING + KEY EXCHANGE
// ═══════════════════════════════════════
function handleConn(conn) {
  const pid = conn.peer;
  if (pid === peer.id) return;

  conn.on('open', async () => {
    // Avoid duplicates
    if (peers.has(pid) && peers.get(pid).conn?.open) {
      conn.close();
      return;
    }

    peers.set(pid, { conn, username: pid.slice(-6), sharedKey: null });

    // Send handshake
    const pub = await exportPub(myKeyPair.publicKey);
    conn.send(JSON.stringify({
      t: 'hello',
      u: myUsername,
      pk: pub,
      // Share our known peer IDs so the newcomer can connect to them too
      peers: [...peers.keys()].filter(k => k !== pid)
    }));

    renderPeers();
  });

  conn.on('data', async raw => {
    let msg;
    try { msg = JSON.parse(raw); } catch { return; }
    const p = peers.get(pid);
    if (!p) return;

    // ── Handshake ──
    if (msg.t === 'hello') {
      p.username = msg.u;
      const remotePub = await importPub(msg.pk);
      p.sharedKey = await deriveKey(myKeyPair.privateKey, remotePub);
      sysMsg(`🔒 ${esc(p.username)} connecté — clé E2E établie`);
      renderPeers();

      // Connect to any peers they know that we don't
      if (msg.peers) {
        for (const otherId of msg.peers) {
          if (otherId !== peer.id && !peers.has(otherId)) {
            const c = peer.connect(otherId, { reliable: true });
            handleConn(c);
          }
        }
      }
    }

    // ── Encrypted message ──
    if (msg.t === 'msg' && p.sharedKey) {
      try {
        const text = await decrypt(msg.p, p.sharedKey);
        addMsg('recv', p.username, text);
      } catch (e) {
        console.warn('Decrypt error', e);
      }
    }
  });

  conn.on('close', () => {
    const p = peers.get(pid);
    if (p) sysMsg(`${esc(p.username)} a quitté le salon`);
    peers.delete(pid);
    renderPeers();
  });

  conn.on('error', () => {
    // Slot probably empty — ignore silently
    peers.delete(pid);
  });
}

// ═══════════════════════════════════════
//  SEND MESSAGE (broadcast to all peers)
// ═══════════════════════════════════════
async function sendToAll() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  addMsg('sent', myUsername, text);
  input.value = '';
  input.focus();

  for (const [, p] of peers) {
    if (!p.sharedKey || !p.conn?.open) continue;
    try {
      const payload = await encrypt(text, p.sharedKey);
      p.conn.send(JSON.stringify({ t: 'msg', p: payload }));
    } catch (e) {
      console.warn('Send error', e);
    }
  }
}

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendToAll();
});

// ═══════════════════════════════════════
//  UI
// ═══════════════════════════════════════
function addMsg(type, author, text) {
  chatLog.push({ type, author, text, time: Date.now() });
  renderMessages();
}

function sysMsg(text) {
  chatLog.push({ type: 'sys', text, time: Date.now() });
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('messages');
  el.innerHTML = chatLog.map(m => {
    const t = new Date(m.time).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (m.type === 'sys') return `<div class="msg sys">${m.text}</div>`;
    return `<div class="msg ${m.type}">
      <div class="msg-author">${esc(m.author)}</div>
      ${esc(m.text)}
      <span class="msg-time">${t}</span>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderPeers() {
  const connected = [...peers.values()].filter(p => p.conn?.open);
  document.getElementById('peerCount').textContent = connected.length;
  document.getElementById('chatPeerCount').textContent = connected.length;

  document.getElementById('peerList').innerHTML = connected.map(p => {
    const ini = p.username.slice(0, 2).toUpperCase();
    const enc = p.sharedKey ? '🔒' : '⏳';
    return `<div class="peer-row">
      <div class="peer-av">${ini}</div>
      <div>
        <div class="peer-nm">${esc(p.username)}</div>
        <div class="peer-st">${enc} chiffré</div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:.8rem;font-size:.68rem;color:var(--text-dim);text-align:center;">Aucun pair pour l\'instant…<br>Partagez le nom du salon.</div>';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function copyMyId() {
  if (!peer?.id) return;
  navigator.clipboard.writeText(peer.id).then(() => {
    document.getElementById('copyHint').textContent = '✓';
    setTimeout(() => document.getElementById('copyHint').textContent = 'copier', 1500);
  });
}

function changeRoom() {
  location.reload();
}
</script>
